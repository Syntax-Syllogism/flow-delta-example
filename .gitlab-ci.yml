FlowDelta:
  image: node:24-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      npx --yes -p @syntax-syllogism/flow-delta@^0.1 flow-delta \
        --repo . \
        --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" \
        --to   "$CI_COMMIT_SHA" \
        --path 'force-app/**/*.flow-meta.xml' \
        --changed-only \
        --out flow-delta-out --json
    - npx --yes -p @syntax-syllogism/flow-delta@^0.1 flow-delta-gitlab --in flow-delta-out
  artifacts:
    paths: [flow-delta-out]
    expire_in: 30 days
  allow_failure: true
